version: 1

profiles:
  a:
    description: "Joya escondida — good rating, few reviews, no/social web"
    min_rating: 4.3
    min_reviews: 10
    max_reviews: 50
    web_requirement: social_or_missing
  b:
    description: "Saturado sin web — many reviews, completely missing web"
    min_rating: 0
    min_reviews: 101
    max_reviews: null
    web_requirement: missing_only

  c:
    description: "Mercado medio — reviews moderadas sin web"
    min_rating: 0
    min_reviews: 30
    max_reviews: 100
    web_requirement: missing_only

  d:
    description: "Profesional con web débil — tiene web pero digital gap alto"
    min_rating: 4.0
    min_reviews: 20
    max_reviews: null
    web_requirement: any

social_domains:
  - facebook.com
  - instagram.com
  - twitter.com
  - tiktok.com
  - linktr.ee
  - beacons.ai
  - wa.me
  - bio.link

persist_rejected: true

source_refresh:
  google_places: 30   # re-enrich mensual
  mintur: 90          # re-enrich trimestral
  osm: 90
  yelu: 90
  pedidosya: 90

deduplication:
  geo_radius_meters: 500
  name_threshold_online: 0.85
  name_threshold_retroactive: 0.90

scraping:
  discovery_ua_pool:
