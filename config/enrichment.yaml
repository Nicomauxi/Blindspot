heuristic_discovery:
  enabled: true
  thresholds:
    website: 0.7
    website_single_word: 0.35
    social: 0.6
  tld_priority:
    - com.uy
    - uy
    - com
  max_candidates_to_probe: 15
  max_social_variants: 3
  city_suffixes:
    montevideo: mvd
  mobile_prefixes_uy:
