version: 3
recent_reviews_threshold_days: 180

# business_quality: 0-100. Qué tan "valioso como negocio offline" es este lead.
business_quality:
  rules:
    - name: rating_excellent
      condition: { field: rating, op: gte, value: 4.5 }
      weight: 25
    - name: rating_good
      condition: { field: rating, op: between, value: [4.0, 4.5] }
      weight: 15
    - name: reviews_high
      condition: { field: review_count, op: gte, value: 100 }
      weight: 25
    - name: reviews_medium
      condition: { field: review_count, op: between, value: [30, 100] }
      weight: 15
    - name: reviews_low
      condition: { field: review_count, op: between, value: [10, 30] }
      weight: 8
    - name: business_operational
      condition: { field: business_status, op: eq, value: OPERATIONAL }
      weight: 10
    - name: has_photos
      condition: { field: google_data.photos_count, op: gte, value: 5 }
      weight: 10
    - name: has_hours
      condition: { field: google_data.has_hours, op: eq, value: true }
      weight: 5
    - name: has_recent_reviews
      condition: { field: google_data.has_recent_reviews, op: eq, value: true }
      weight: 10

# digital_gap: 0-100. Qué tan ausente está el negocio digitalmente.
digital_gap:
  rules:
    - name: website_heuristic
      condition: { tag: website-heuristic }
      weight: 20
    - name: no_website
      condition: { tag: no-website }
      weight: 35
    - name: high_reviews_no_web
      condition: { tag: high-reviews-no-web }
      weight: 10
    - name: fb_heuristic
      condition: { tag: fb-heuristic }
      weight: 15
    - name: fb_confirmed
      condition: { tag: fb-confirmed }
      weight: 20
    - name: fb_only
      condition: { tag: fb-only-presence }
      weight: 25
    - name: ig_heuristic
      condition: { tag: ig-heuristic }
      weight: 15
    - name: ig_confirmed
      condition: { tag: ig-confirmed }
      weight: 20
    - name: ig_only
      condition: { tag: ig-only-presence }
      weight: 25
    - name: social_link_only
      condition: { tag: social-link-only }
      weight: 20
    - name: web_only_no_social
      condition: { tag: web-only-no-social }
      weight: 28
    - name: ssl_missing
      condition: { tag: ssl-missing }
      weight: 10
    - name: not_responsive
      condition: { tag: not-responsive }
      weight: 10
    - name: pixel_missing
      condition: { tag: pixel-missing }
      weight: 5
    - name: analytics_missing
      condition: { tag: analytics-missing }
      weight: 5
    - name: email_missing
      condition: { tag: email-missing }
      weight: 5
    - name: chat_widget_present
      condition: { tag: chat-widget }
      weight: -3
    - name: chat_widget_missing
      condition: { tag: chat-widget-missing }
      weight: 3
    - name: whatsapp_missing
      condition: { tag: whatsapp-missing }
      weight: 10
    - name: whatsapp_derived
      condition: { tag: whatsapp-derived }
      weight: 10
    - name: whatsapp_confirmed
      condition: { tag: whatsapp-confirmed }
      weight: 3
    - name: stack_obsolete
      condition: { tag: stack-obsolete }
      weight: 10
    - name: domain_old_stale
      condition: { tag: domain-old-stale }
      weight: 5
    - name: web_outdated
      condition: { tag: web-outdated }
      weight: 8
    - name: hours_missing_on_web
      condition: { tag: hours-missing-on-web }
      weight: 3
    - name: site_unreachable
      condition: { tag: site-unreachable }
      weight: 15

# Reglas mutuamente excluyentes: si más de una regla del grupo matchea, solo cuenta la de mayor peso.
mutual_exclusions:
  business_quality:
    - [rating_excellent, rating_good]
    - [reviews_high, reviews_medium, reviews_low]
  digital_gap:
    - [website_heuristic, no_website, fb_only, ig_only, social_link_only, web_only_no_social]
    - [fb_only, fb_confirmed, fb_heuristic]
    - [ig_only, ig_confirmed, ig_heuristic]
    - [whatsapp_confirmed, whatsapp_derived, whatsapp_missing]

# Cap por dimensión (clamp final).
cap: 100

# Fórmula de prospect_score
prospect_formula: "commercial_score_v3"

commercial_score:
  gap_depth_cap: 60
  source_quality_bonus:
    google_places: 0
    osm: 8
    yelu: 10
    pedidosya: 15
    mintur: 20
  commercial_breadth:
    secondary_threshold: 30
    secondary_bonus: 8
    tertiary_threshold: 30
    tertiary_bonus: 4
  business_quality:
    rating_tiers:
      - { min: 4.0, max: 4.3, points: 2 }
      - { min: 4.3, max: 5.01, points: 5 }
    review_tiers:
      - { min: 20, max: 50, points: 1 }
      - { min: 50, max: null, points: 3 }
    data_confidence_multiplier: 3
    contact_reliability_multiplier: 2
    corroboration_bonus: 2
    cap: 15
  accessibility:
    tier_base: { X: 0.35, D: 0.7, C: 0.92, B: 1.12, A: 1.28 }
    reliability_adjustment: { base: 0.75, weight: 0.25 }
    score_adjustment: { base: 0.9, weight: 0.22 }
    contact_score:
      weights:
        email: 45
        extra_email: 5
        whatsapp_direct: 28
        whatsapp_derived: 18
        phone: 18
        phone_confirmed_bonus: 6
        address: 8
        website: 6
        contact_form: 4
        social_dm_channel: 3
        whatsapp_web_link: 5
        multi_channel_bonus: 6
        high_confidence_bonus: 4
      thresholds: { A: 70, B: 45, C: 24, D: 8 }
      cap: 100
  timing:
    urgency_high: 0.15
    new_business_window: 0.05
    competitive_pressure_isolated: 0.05
    franchise_penalty: -0.15
    cap: 1.20
    floor: 0.85
    days_in_pool:
      fresh_threshold_days: 7
      fresh_bonus: 0.05
      stale_threshold_days: 90
      stale_penalty: -0.05
  urgency_bonus: { high: 5, medium: 2, low: 0 }

thresholds:
  hot: 50
  pitcheable: 35
  pool: 25

pitch_hooks:
  web_nuevo:
    default: "No tienen web, estan perdiendo clientes que buscan online."
    overrides:
      - when:
          has_delivery: true
        text: "Estan pagando 30% a PedidosYa; con su propia web de pedidos, recuperan ese margen."
  rediseno:
    default: "Su web existe pero no convierte; responsive y SEO moderno."
  marketing:
    default: "Tienen web pero no redes activas; community management."
  software:
    default: "El negocio ya opera, pero sin sistema propio pierde control y eficiencia."
    overrides:
      - when:
          has_delivery: true
          has_pos: false
        text: "Ya tienen delivery, les falta el sistema de gestion central."
      - when:
          has_delivery: false
        text: "Sin sistema de pedidos propio, estan atados a comisiones y procesos manuales."
  catalogo:
    default: "Hoy obligan al cliente a preguntar lo basico; un catalogo claro reduce friccion de compra."
    overrides:
      - when:
          niche: restaurant
        text: "Sin carta digital, muchos clientes no resuelven que pedir antes de ir."
      - when:
          has_reservations: false
          niche: gym
        text: "Sin sistema de reservas, pierden alumnos que no saben como agendar."
  contacto_directo:
    default: "El negocio existe y es contactable, pero no tiene activos digitales que lo ayuden a vender mejor."

buyer_types:
  agencia_web:
    formula:
      web_nuevo: 0.50
      rediseno:  0.30
      marketing: 0.20

  software_pos:
    formula:
      software: 0.50
      catalogo:  0.20
    inferred_bonuses:
      has_delivery: 20
    inferred_penalties:
      has_pos: -50

  marketing_social:
    formula:
      marketing: 0.55
      rediseno:  0.25
      web_nuevo: 0.20

  delivery_propio:
    inferred_required:
      has_delivery: true
    formula:
      software: 0.40
      catalogo: 0.30
    inferred_bonuses:
      has_delivery: 30
    inferred_penalties:
      has_pos: -60

  reservas_online:
    niche_required:
      - gym
      - hairdresser
      - restaurant
    inferred_required:
      has_reservations: false
    formula:
      software: 0.60
      catalogo: 0.20
    inferred_bonuses:
      has_delivery: 10
    inferred_penalties:
      has_reservations: -100

  catalogo_digital:
    niche_required:
      - restaurant
      - retail
    inferred_required:
      has_online_catalog: false
    formula:
      catalogo:  0.55
      web_nuevo: 0.25
      marketing: 0.20
    inferred_penalties:
      has_online_catalog: -100

  whatsapp_business:
    tag_required: whatsapp-confirmed
    formula:
      software:  0.40
      marketing: 0.35
      catalogo:  0.25
    inferred_penalties:
      has_pos: -30
      has_ecommerce: -40
